<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KGB Kind Gift</title>
    </head>
    <body style="background-color: black; width: 100%; text-align: center">
        <h2 style="color: white">Donnes tes infos au KGB stp fr</h2>
        <form
            action="https://www.cnewyork.net/guide/les-musees/musee-du-kgb-new-york/"
            method="post"
            style="text-align: left"
        >
            <fieldset style="background-color: red; color: white">
                <fieldset>
                    <label for="first-name">Prénom:</label>
                    <input
                        id="first-name"
                        name="first-name"
                        type="text"
                        maxlength="20"
                        required
                    />

                    <label for="name">Nom:</label>
                    <input
                        id="name"
                        name="name"
                        type="text"
                        maxlength="15"
                        required
                    />

                    <br />

                    <label>Genre:</label>
                    <input
                        id="male-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="male-gender">Homme</label>
                    <input
                        id="woman-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="woman-gender">Femme</label>
                    <input
                        id="trans-gender-male"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="trans-gender-male">Transgenre masculin</label>
                    <input
                        id="trans-gender-woman"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="trans-gender-woman">Transgenre féminin</label>
                    <input
                        id="drag-queen-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="drag-queen-gender">Drag queen</label>
                    <input
                        id="non-binary"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="non-binary">Non binaire</label>
                    <input
                        id="binary-being"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="binary-being">Etre binaire</label>
                    <input
                        id="furry-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="furry-gender">Furry</label>
                    <input
                        id="terrian-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="terrian-gender">Terrian</label>
                    <input
                        id="vegan-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="vegan-gender">Végan</label>
                    <input
                        id="animal-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="animal-gender">Animal</label>
                    <input
                        id="object-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="object-gender">Objet</label>
                    <input
                        id="fantasy-being-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="fantasy-being-gender">Etre fantastique</label>
                    <input
                        id="gay-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="gay-gender">Gay</label>
                    <input
                        id="pedofile-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="pedofile-gender">Pédofile</label>
                    <input
                        id="not-assumed-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="not-assumed-gender">Pas assumé</label>
                    <input
                        id="gambling-addinct-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="gambling-addinct-gender"
                        >Addict au gambling</label
                    >
                    <input
                        id="lol-player-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="lol-player-gender"
                        >Joueur de LOL (ou autres merdes compétitives en multi
                        vous êtes de la même race)</label
                    >
                    <input
                        id="wolfy-d3v-when-this-form-has-been-done-gender"
                        name="gender"
                        type="radio"
                        required
                    />
                    <label for="wolfy-d3v-when-this-form-has-been-done-gender"
                        >WolfY_D3v, quand ce formulaire a été fait (j'étais en
                        roue libre...)</label
                    >
                    <input
                        id="no-gender"
                        name="gender"
                        type="radio"
                        required
                        checked
                    />
                    <label for="no-gender">Non genré</label>

                    <br />

                    <label for="brithday">Date de naissance:</label>
                    <input id="birthday" name="birthday" type="date" required />
                    <label for="age">Age:</label>
                    <input id="age" name="age" type="number" required />

                    <br />

                    <label for="num"
                        >Numéro de téléphone: (format attendu ->
                        01.23.45.67.89)</label
                    >
                    <input
                        id="num"
                        name="num"
                        type="tel"
                        pattern="[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}-"
                        required
                    />
                    <label for="mail">Adresse E-Mail:</label>
                    <input id="mail" name="mail" type="email" required />

                    <br />

                    <label for="irl-adress">Adress physique:</label>
                    <input
                        id="irl-adress"
                        name="irl-adress"
                        type="text"
                        required
                    />

                    <br />
                    <br />

                    <label for="agree"
                        >J'accepte, en remplissant ce formulaire, de me laisser
                        faire sans résister si le KGB vient mettre fin à mes
                        jours à cause de mes choix de vie stupides (ou de mon
                        nom nul, merci papa maman...)</label
                    >
                    <input id="agree" name="agree" type="checkbox" required />
                </fieldset>

                <input type="submit" value="Subscribe" />
                <input type="reset" value="Reset" />
            </fieldset>
        </form>
    </body>
</html>
