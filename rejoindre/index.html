<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rejoindre l'équipe</title>
	<meta name="description" content="Rejoignez l'équipe Dragonheart Studios et participez à la création d'expériences inoubliables.">
	<link rel="stylesheet" href="../assets/css/main.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
	<link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>
	<div id="background">
		<img src="../assets/images/background.png" alt="Background Image">
	</div>
	
	<div id="header-container"></div>

	<div id="gradient">
		<main>
			<h1 data-i18n="recruitment.title">Rejoindre l'équipe</h1>
			<p class="intro-text" data-i18n="recruitment.intro">
				Vous êtes passionné par le développement de jeux vidéo ? Rejoignez notre équipe et participez à la création d'expériences inoubliables !
			</p>

			<form id="form">
				<h2 data-i18n="recruitment.sections.general">Informations générales</h2>
				<div class="form-group">
					<input name="pseudo" placeholder="Pseudo *" type="text" required data-i18n="recruitment.form.pseudo" />
					<input name="age" placeholder="Âge" type="number" min="13" max="99" data-i18n="recruitment.form.age" />
					<input name="email" placeholder="Email *" type="email" required data-i18n="recruitment.form.email" />
				</div>

				<h2 data-i18n="recruitment.sections.positions">Poste(s) souhaité(s)</h2>
				<fieldset>
					<legend data-i18n="recruitment.form.select_pos">Sélectionnez un ou plusieurs postes</legend>
					<div class="checkbox-grid">
						<label>
							<input type="checkbox" name="poste" value="developpeur">
							<span data-i18n="recruitment.roles.dev">Développeur</span>
						</label>
						<label>
							<input type="checkbox" name="poste" value="graphiste">
							<span data-i18n="recruitment.roles.artist">Graphiste</span>
						</label>
						<label>
							<input type="checkbox" name="poste" value="compositeur">
							<span data-i18n="recruitment.roles.composer">Compositeur</span>
						</label>
						<label>
							<input type="checkbox" name="poste" value="game_designer">
							<span data-i18n="recruitment.roles.gamedesign">Game Designer</span>
						</label>
						<label class="checkbox-other">
							<input type="checkbox" name="poste" value="autre" id="poste_autre_check">
